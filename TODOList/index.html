<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container{
            width: 500px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            margin-bottom: 20px;
        }

        .input-box{
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input{
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        .add{
            padding: 10px 20px;
            cursor: pointer;
        }

        .list{
            display: flex;
            flex-direction: column;
            gap: 10px;
            list-style-position: inside;
        }

        .task{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .task button{
            padding: 5px 10px;
            cursor: pointer;
        }

        .done{
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ToDo List</h1>

        <div class="input-box">
            <input
                type="text"
                class="input"
                placeholder="Enter Task..."
            >
            <button class="add">Add</button>
        </div>

        <ol class="list">
            <!-- Tasks will be added here -->
        </ol>
    </div>

    <script src="script.js"></script>

</body>
</html>
